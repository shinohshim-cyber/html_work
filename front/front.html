<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/front.css">
  <title>Document</title>
</head>
<body>
  <div class="container">
  <h1>프런트엔드 개발자 지원서</h1>
  <h3>HTML, CSS, Javascript에 기술적 이해와 경험이 있는 분을 찾습니다.</h3>
  <div style="border-bottom: 1px solid gray; margin-bottom: 20px;"></div>
    <form>     
     <fieldset class="person-info">
        <legend>개인정보</legend>
          <ul>
            <li>
              <label for="text">이름</label>
              <input type="text" 
              id="name" name="name" 
              placeholder="공백없이 입력하세요">
            </li>
          </ul>
          <ul>
            <li>
              <label for="phone">연락처</label>
              <input type="tel" id="phone" name="phone">
            </li>
          </ul>
      </fieldset>
      <fieldset class="part">
        <legend>지원 분야</legend>
        <ul>
          <li>
              <input type="radio" name="part" id="web_pub" value="web_pub">
              <label for="mail_yes">웹 퍼블리싱</label>
          </li>
          <li>
              <input type="radio" name="part" id="web_app" value="web_app">
              <label for="mail_yes">웹 애플리케이션 개발</label>
          </li>
         <li>
              <input type="radio" name="part" id="dev" value="dev">
              <label for="mail_yes">개발 환경 개선</label>
          </li>
        </ul>
      </fieldset>
      <fieldset>
        <legend>지원동기</legend>
        <textarea name="memo" id="memo" rows="5" cols="80" placeholder="본사 지원 동기를 간략히 써 주세요."></textarea>
      </fieldset>
      <div class="buttons">
        <input type="submit" value="접수하기">
        <input type="reset" value="다시 쓰기">
      </div>
    </form>
  </div>
</body>
</html>
